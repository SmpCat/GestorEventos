services:
  web:
    build: .
    image: ghcr.io/smpcat/gestoreventos:latest
    container_name: gestoreventos
    user: "root"
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "3000:3000"
    volumes:
      - /share/CACHEDEV1_DATA/Container/gestoreventos/data:/app/data
      - /share/CACHEDEV1_DATA/Container/gestoreventos/public/uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - NEXT_PUBLIC_BASE_URL=https://eventos-pro.duckdns.org
      - JWT_SECRET=cambia_esta_clave_por_una_super_segura_para_el_nas
    networks:
      - proxy_network



networks:
  proxy_network:
    external: true
